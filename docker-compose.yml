version: '3.8'

services:
  fsm:
    image: S0CT/fsm:latest
    ports:
      - "8888:8888"           # Expose the FSM web UI (Unraid Optimization)
      - "34197:34197/udp"     # Factorio game port (if needed)
      - "27015:27015"         # RCON port
    volumes:
      - ./data:/data             # Unraid Optimization: Factorio config files
      - ./fsm.ini:/fsm.ini       # Main FSM configuration
    environment:
      # - PUID=1000
      # - PGID=1000
      - TZ=UTC
    restart: unless-stopped